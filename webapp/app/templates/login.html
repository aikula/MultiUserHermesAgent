{% extends "base.html" %}
{% block title %}Вход — Hermes{% endblock %}
{% block content %}
<h1>Вход</h1>
{% if error %}<div class="alert">{{ error }}</div>{% endif %}
<form method="post" action="{{ chat_prefix }}/login" class="card">
  <label>Логин
    <input type="text" name="login" value="{{ login or '' }}" required autofocus>
  </label>
  <label>Пароль
    <input type="password" name="password" required>
  </label>
  <button type="submit">Войти</button>
</form>
<p class="muted">Нет аккаунта? <a href="{{ chat_prefix }}/register">Зарегистрироваться</a></p>
{% endblock %}
