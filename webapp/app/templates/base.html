<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Hermes{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  {% block head %}{% endblock %}
  <link rel="stylesheet" href="{{ chat_prefix }}/static/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ chat_prefix }}/">Hermes</a>
    <nav>
      {% if request.cookies.session %}
        <a href="{{ chat_prefix }}/">Чат</a>
        <a href="{{ chat_prefix }}/files">Файлы</a>
        <a href="{{ chat_prefix }}/profile">Профиль</a>
        <a href="{{ chat_prefix }}/logout">Выйти</a>
      {% else %}
        <a href="{{ chat_prefix }}/login">Вход</a>
        <a href="{{ chat_prefix }}/register">Регистрация</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
