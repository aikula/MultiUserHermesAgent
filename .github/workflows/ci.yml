name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  webapp-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check app tests
      - run: pytest -q
      - run: bandit -r app -ll
