services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: hermes-gateway:local
    container_name: hermes-gateway
    restart: unless-stopped
    user: "${HERMES_UID:-0}:${HERMES_GID:-0}"
    environment:
      - API_SERVER_KEY=${API_SERVER_KEY}
      - API_SERVER_HOST=${API_SERVER_HOST:-0.0.0.0}
      - API_SERVER_ENABLED=${API_SERVER_ENABLED:-true}
      - API_SERVER_CORS_ORIGINS=${API_SERVER_CORS_ORIGINS}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,0.0.0.0}
    volumes:
      - /root/.hermes:/opt/data
    networks:
      - tghub-network
    labels:
      - "traefik.enable=true"
    command: ["gateway", "run"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  dashboard:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: hermes-dashboard
    restart: unless-stopped
    user: "${HERMES_UID:-0}:${HERMES_GID:-0}"
    depends_on:
      - gateway
    environment:
      - HERMES_UID=${HERMES_UID:-0}
      - HERMES_GID=${HERMES_GID:-0}
      - GATEWAY_HEALTH_URL=${GATEWAY_HEALTH_URL:-http://hermes-gateway:8642/health/detailed}
    volumes:
      - /root/.hermes:/opt/data
    networks:
      - tghub-network
    labels:
      - "traefik.enable=true"

      # Dashboard route — https://${HERMES_HOST}/
      - "traefik.http.services.hermes-dash.loadbalancer.server.port=${HERMES_DASHBOARD_PORT:-9119}"
      - "traefik.http.routers.hermes-dash.rule=Host(`${HERMES_HOST}`)"
      - "traefik.http.routers.hermes-dash.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.hermes-dash.tls=true"
      - "traefik.http.routers.hermes-dash.tls.certresolver=${TRAEFIK_CERTRESOLVER:-myresolver}"
      - "traefik.http.routers.hermes-dash.middlewares=dash-auth"
      - "traefik.http.middlewares.dash-auth.basicauth.users=${DASHBOARD_BASIC_AUTH_USER}:$$apr1$$zGvtK9NI$$husVhmRyWbKAm3atjtoaD/"
    # Prevent gateway-default s6-log from writing to /opt/data/logs/gateways/default/
    # (owned by the gateway container — lock conflict on shared volume).
    command: ["sh", "-c", "touch /run/service/gateway-default/down /run/service/gateway-default/log/down 2>/dev/null; echo d > /run/service/gateway-default/supervise/control 2>/dev/null; echo d > /run/service/gateway-default/log/supervise/control 2>/dev/null; exec hermes dashboard --host 0.0.0.0 --no-open --insecure"]
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:9119/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    image: hermes-webapp:local
    container_name: hermes-webapp
    restart: unless-stopped
    user: "${HERMES_UID:-0}:${HERMES_GID:-0}"
    depends_on:
      - gateway
    env_file:
      - .env.hermes
    environment:
      - USERS_DB_PATH=/opt/app/data/users.db
      - HERMES_USERS_DIR=/opt/hermes-users
      - HERMES_SHARED_DIR=/opt/hermes-shared
      - SOUL_TEMPLATE_PATH=/opt/app/data/templates/SOUL.md
      - WELCOME_QUOTA=${WELCOME_QUOTA:-2000000}
      - JWT_SECRET=${WEBAPP_JWT_SECRET}
      - INVITE_CODE_BOOTSTRAP=${INVITE_CODE_BOOTSTRAP:-}
      - HERMES_API_URL=http://hermes-gateway:8642
      - HERMES_API_KEY=${API_SERVER_KEY}
      - HERMES_MODEL=${FIREWORKS_MODEL}
      - MAX_HISTORY_MESSAGES=${MAX_HISTORY_MESSAGES:-8}
      - SUMMARY_THRESHOLD=${SUMMARY_THRESHOLD:-20}
      - SUMMARY_MAX_HISTORY=${SUMMARY_MAX_HISTORY:-100}
      - ALERT_THRESHOLD_PCT=${ALERT_THRESHOLD_PCT:-80}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_BOT_TOKEN=${TELEGRAM_ADMIN_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      - TELEGRAM_LINK_TTL=${TELEGRAM_LINK_TTL:-600}
      - WEBAPP_INTERNAL_SECRET=${WEBAPP_INTERNAL_SECRET}
      - STT_API_URL=${STT_API_URL:-}
      - STT_API_KEY=${STT_API_KEY:-}
    volumes:
      - /root/.hermes-app:/opt/app/data
      - /root/.hermes/users:/opt/hermes-users:rw
      - /root/.hermes-shared:/opt/hermes-shared:rw
      - /root/.hermes/cron:/opt/hermes-cron:ro
    networks:
      - tghub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.hermes-webapp.loadbalancer.server.port=9000"
      # https://hermes.kulinich.ru/chat/* → webapp (pathPrefix; FastAPI знает root_path=/chat)
      - "traefik.http.routers.hermes-webapp.rule=Host(`${HERMES_HOST}`) && PathPrefix(`/chat`)"
      - "traefik.http.routers.hermes-webapp.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.hermes-webapp.tls=true"
      - "traefik.http.routers.hermes-webapp.tls.certresolver=${TRAEFIK_CERTRESOLVER:-myresolver}"
      - "traefik.http.routers.hermes-webapp.priority=100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  tghub-network:
    external: true
